{% extends "auth/_base_auth.html" %}

{% block card %}
<div class="auth-header">
    <div class="auth-logo" style="position: relative;">
        <img src="/static/logo_fluxi.png" alt="Fluxi.IA" style="opacity: 0.55; filter: grayscale(0.5);">
        <i class="fas fa-lock"
            style="position: absolute; bottom: -4px; right: -4px; background: #6b7280; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; border: 2px solid white;"></i>
    </div>
    <h1 class="auth-title">Cadastro fechado</h1>
    <p class="auth-subtitle">Este Fluxi não está aceitando novos usuários.</p>
</div>

<div class="auth-body">
    <p style="font-size: 0.93rem; color: var(--c-text-muted); line-height: 1.55;">
        Se você precisa de acesso, peça ao administrador. Ele pode liberar novos cadastros definindo
        <code style="background: var(--c-primary-soft); padding: 2px 6px; border-radius: 4px;">FLUXI_ALLOW_SIGNUP=true</code>
        no arquivo <code>.env</code>.
    </p>

    <a href="/login" class="btn-primary" style="text-decoration: none; margin-top: 18px;">
        <i class="fas fa-arrow-left"></i> Voltar pro login
    </a>
</div>
{% endblock %}
