<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --c-bg: #0f172a;
            --c-bg-grad-1: #1e1b4b;
            --c-bg-grad-2: #312e81;
            --c-surface: #ffffff;
            --c-text: #111827;
            --c-text-muted: #6b7280;
            --c-border: #e5e7eb;
            --c-primary: #6366f1;
            --c-primary-dark: #4f46e5;
            --c-primary-soft: #eef2ff;
            --c-danger: #ef4444;
            --c-danger-soft: #fee2e2;
            --c-success: #10b981;
            --radius: 14px;
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 16px;
            color: var(--c-text);
            background: radial-gradient(ellipse at top left, var(--c-bg-grad-1), var(--c-bg-grad-2) 50%, var(--c-bg) 100%);
        }

        .auth-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .auth-card {
            background: var(--c-surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
        }

        .auth-header {
            padding: 32px 32px 12px;
            text-align: center;
        }

        .auth-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--c-primary), var(--c-primary-dark));
            color: white;
            font-size: 1.6rem;
            margin-bottom: 18px;
        }

        .auth-title {
            margin: 0;
            font-size: 1.55rem;
            font-weight: 700;
        }

        .auth-subtitle {
            margin: 8px 0 0;
            color: var(--c-text-muted);
            font-size: 0.93rem;
        }

        .auth-body {
            padding: 8px 32px 28px;
        }

        .auth-footer {
            padding: 18px 32px;
            border-top: 1px solid var(--c-border);
            background: #fafafa;
            text-align: center;
            font-size: 0.88rem;
            color: var(--c-text-muted);
        }

        .auth-footer a {
            color: var(--c-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover { text-decoration: underline; }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--c-text);
            margin-bottom: 6px;
        }

        .form-label .req { color: var(--c-danger); }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            font-size: 1rem;
            border: 2px solid var(--c-border);
            border-radius: 10px;
            background: white;
            color: var(--c-text);
            transition: border-color 0.15s, box-shadow 0.15s;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--c-primary);
            box-shadow: 0 0 0 3px var(--c-primary-soft);
        }

        .form-hint {
            font-size: 0.78rem;
            color: var(--c-text-muted);
            margin-top: 6px;
        }

        .btn-primary {
            width: 100%;
            padding: 13px 16px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, var(--c-primary), var(--c-primary-dark));
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.1s, box-shadow 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -8px rgba(79, 70, 229, 0.5);
        }

        .btn-primary:active { transform: translateY(0); }

        .alert {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 0.88rem;
            margin-bottom: 18px;
        }

        .alert-danger {
            background: var(--c-danger-soft);
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .alert-info {
            background: var(--c-primary-soft);
            color: #3730a3;
            border: 1px solid #c7d2fe;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--c-text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 8px;
        }

        .toggle-password:hover { color: var(--c-primary); }

        .strength-meter {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .strength-bar {
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: var(--c-border);
            transition: background 0.2s;
        }

        .strength-bar.fraca-1 { background: var(--c-danger); }
        .strength-bar.media-2 { background: #f59e0b; }
        .strength-bar.boa-3 { background: var(--c-success); }
        .strength-bar.forte-4 { background: var(--c-primary); }

        .strength-label {
            font-size: 0.75rem;
            margin-top: 4px;
            color: var(--c-text-muted);
            min-height: 14px;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body>
    <div class="auth-shell">
        <div class="auth-card">
            {% block card %}{% endblock %}
        </div>
    </div>
    {% block scripts %}{% endblock %}
</body>

</html>
