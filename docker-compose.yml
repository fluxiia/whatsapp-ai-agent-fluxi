services:
  fluxi:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - "./data:/app/data"
      - "./uploads:/app/uploads"
      - "./sessoes:/app/sessoes"
      - "./rags:/app/rags"
      - "./agent_data:/app/agent_data"
    environment:
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8000}
      - DEBUG=${DEBUG:-True}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/fluxi.db}
      - UPLOAD_DIR=${UPLOAD_DIR:-./uploads}
    depends_on:
      sandbox:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  sandbox:
    image: ghcr.io/agent-infra/sandbox:latest
    container_name: fluxi-sandbox
    privileged: true
    shm_size: "2gb"
    ports:
      - "${SANDBOX_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - WORKSPACE=/home/gem
      - TZ=${TZ:-America/Sao_Paulo}
    restart: unless-stopped
