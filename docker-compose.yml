services:
  fluxi:
    build: .
    ports:
      - "${HOST_PORT:-10000}:8000"
    volumes:
      - "fluxi_data:/app/data"
      - "fluxi_uploads:/app/uploads"
      - "fluxi_sessoes:/app/sessoes"
      - "fluxi_rags:/app/rags"
      - "fluxi_agent_data:/app/agent_data"
      - "fluxi_sandbox:/app/fluxi_sandbox"
    environment:
      - HOST=${HOST:-0.0.0.0}
      - PORT=8000
      - DEBUG=${DEBUG:-True}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/fluxi.db}
      - UPLOAD_DIR=${UPLOAD_DIR:-./uploads}
      - INTERNAL_SANDBOX_ROOT=/app/fluxi_sandbox
      - FLUXI_SECRET_KEY=${FLUXI_SECRET_KEY}
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY}
      - FLUXI_ALLOW_SIGNUP=${FLUXI_ALLOW_SIGNUP:-false}
      - FLUXI_ADMIN_RESET_EMAIL=${FLUXI_ADMIN_RESET_EMAIL:-}
      - FLUXI_ADMIN_RESET_PASSWORD=${FLUXI_ADMIN_RESET_PASSWORD:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  fluxi_data:
  fluxi_uploads:
  fluxi_sessoes:
  fluxi_rags:
  fluxi_agent_data:
  fluxi_sandbox:
